<!DOCTYPE html>
<html>
<head>
    <title>Job Application Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Software Developer</h1>

<p>Company: Demo Technologies Pvt Ltd</p>
<p>Location: Hyderabad</p>
<p>Experience: 0-2 Years</p>
<p>Skills: Java, SQL, HTML, CSS</p>

<form id="applicationForm">

<input type="text" id="fullName" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email" required>

<input type="text" id="phoneNumber" placeholder="Phone Number" required>

<input type="text" id="qualification" placeholder="Qualification">

<input type="text" id="experience" placeholder="Experience">

<input type="text" id="skills" placeholder="Skills">

<textarea id="coverLetter" placeholder="Cover Letter"></textarea>

<button type="submit">Apply Now</button>

</form>

<div id="message"></div>

<script src="script.js"></script>

</body>
</html>
